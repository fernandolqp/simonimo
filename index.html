
<!DOCTYPE html>
<html lang="es" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SIMÓNIMO Música | Música en vivo en Buenos Aires</title>
    <meta name="description" content="Música que une y transforma. SIMÓNIMO Música es un proyecto de Buenos Aires con una experiencia cercana y energía real." />
    <!-- Google Fonts: Montserrat for Titles, Inter for Body -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      :root {
        --bordo: #8A1A30;
        --negro: #0B0B0D;
        --blanco: #FFFFFF;
        --gris: #CFCFD4;
      }
      body {
        font-family: 'Inter', sans-serif;
        background-color: var(--bordo);
        color: var(--blanco);
        overflow-x: hidden;
      }
      .font-title {
        font-family: 'Montserrat', sans-serif;
      }
      /* Custom shadow for poster effect */
      .poster-shadow {
        text-shadow: 4px 4px 0px rgba(11, 11, 13, 1);
      }
      /* Subtle musical background texture */
      .music-texture {
        background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M10 20h80M10 30h80M10 40h80M10 50h80M10 60h80' stroke='white' stroke-width='0.5' fill='none' opacity='0.08'/%3E%3C/svg%3E");
      }

      /* JAZZ EFFECTS */
      
      /* Grain / Noise Overlay */
      .grain-overlay {
        position: fixed;
        top: -50%;
        left: -50%;
        right: -50%;
        bottom: -50%;
        width: 200%;
        height: 200%;
        background: transparent url('http://assets.iceable.com/img/noise-transparent.png') repeat 0 0;
        background-repeat: repeat;
        animation: noise 0.2s infinite;
        opacity: .06;
        visibility: visible;
        z-index: 9999;
        pointer-events: none;
      }

      @keyframes noise {
        0% { transform: translate(0,0) }
        10% { transform: translate(-5%,-5%) }
        20% { transform: translate(-10%,5%) }
        30% { transform: translate(5%,-10%) }
        40% { transform: translate(-5%,15%) }
        50% { transform: translate(-10%,5%) }
        60% { transform: translate(15%,0) }
        70% { transform: translate(0,10%) }
        80% { transform: translate(-15%,0) }
        90% { transform: translate(10%,5%) }
        100% { transform: translate(5%,0) }
      }

      /* Slow Floating Animation */
      @keyframes float-jazz {
        0%, 100% { transform: translateY(0) rotate(0); }
        50% { transform: translateY(-30px) rotate(5deg); }
      }
      .animate-float-jazz {
        animation: float-jazz 10s ease-in-out infinite;
      }

      /* Neon Pulse */
      @keyframes neon-pulse {
        0%, 100% { text-shadow: 4px 4px 0px rgba(11, 11, 13, 1); }
        50% { text-shadow: 0 0 15px rgba(255, 255, 255, 0.4), 4px 4px 0px rgba(11, 11, 13, 1); }
      }
      .neon-glow {
        animation: neon-pulse 4s ease-in-out infinite;
      }

      /* Section Reveal */
      .reveal {
        opacity: 0;
        transform: translateY(30px);
        transition: all 1s cubic-bezier(0.16, 1, 0.3, 1);
      }
      .reveal.active {
        opacity: 1;
        transform: translateY(0);
      }
    </style>

</script>
</head>

  </body>
